version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:5001:5001"
    env_file:
      - ./backend/.env.production
    restart: unless-stopped
    depends_on:
      - daemon

  daemon:
    build: ./backend
    command: node scripts/task-daemon.js
    env_file:
      - ./backend/.env.production
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ./frontend/.env.production
    restart: unless-stopped
    depends_on:
      - backend
